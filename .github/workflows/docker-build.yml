name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update version in files
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Update package.json version
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json

          # Update docker-compose.prod.yml image tag
          sed -i "s|ghcr.io/jb-delafosse/fever-log:.*|ghcr.io/jb-delafosse/fever-log:$VERSION|" docker-compose.prod.yml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.version.outputs.version }}"
          title: "chore: bump version to ${{ steps.version.outputs.version }}"
          body: |
            Automated version bump triggered by tag `${{ github.ref_name }}`.

            ## Changes
            - Updated `package.json` version to `${{ steps.version.outputs.version }}`
            - Updated `docker-compose.prod.yml` image tag to `${{ steps.version.outputs.version }}`

            ## Docker Image
            Image published to: `ghcr.io/jb-delafosse/fever-log:${{ steps.version.outputs.version }}`
          branch: chore/bump-version-${{ steps.version.outputs.version }}
          base: main
          delete-branch: true
