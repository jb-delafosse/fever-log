version: '3.8'

services:
  fever-log:
    image: ghcr.io/jb-delafosse/fever-log:0.1.2
    container_name: fever-log
    ports:
      - "3000:3000"
    volumes:
      # REQUIRED: Mount data directory for SQLite database persistence
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      # REQUIRED: Set your password here or in .env file
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - DATABASE_PATH=/app/data/fever-log.db
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (optional, adjust based on your NAS)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
